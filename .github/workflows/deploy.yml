name: build-and-deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つに絞る（進行中のものはキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # どのイベントでも lint・テスト・ビルドの健全性を確認する
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build # tsc の型チェック + vite build + 404.html 生成
      - name: Pages 用に成果物をアップロード
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # main への push 時のみ GitHub Pages へデプロイ
  deploy:
    if: github.event_name != 'pull_request'
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
